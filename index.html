<!DOCTYPE html>
<html>
<head>
  <title>BeatBaker</title>
  <link rel="stylesheet" href="./style/style.css">
</head>
<body>

    <button class="theme-toggle" id="theme-toggle">
        <svg class="theme-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 24px; height: 24px;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" id="moonIcon" style="display: none;"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" id="sunIcon"/>
        </svg>
    </button>

    <div class="container">
        <div class="layout">
            <div class="sidebar">
                <header class="sidebar-header">
                    <h1 class="title">BeatBaker</h1>
                </header>

                <div class="controls">
                    <div class="btn-group">
                        <button id="playBtn" aria-label="Play">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M8 5v14l11-7z"></path>
                            </svg>
                        </button>
                        <button id="stopBtn" aria-label="Stop">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                            </svg>
                        </button>
                        <button id="clearBtn" aria-label="Clear">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 6V4h8v2"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l1 14h10l1-14"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 10v6"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14 10v6"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="slider-group">
                        <label for="bpmSlider">BPM</label>
                        <input type="range" id="bpmSlider" min="60" max="180" value="120" step="1">
                        <span id="bpmValue">120</span>
                    </div>

                    <div class="slider-group">
                        <label for="volumeSlider">Volume</label>
                        <input type="range" id="volumeSlider" min="0" max="1" value="0.7" step="0.01">
                    </div>
                </div>

                <div class="info-bar">
                    <p>[SPACE] start/stop</p>
                    <p>Click cells to toggle beats</p>
                </div>

                <div class="download-section">
                    <button id="downloadBtn" class="download-btn">
                        <svg class="download-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v12"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M7 10l5 5 5-5"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 21h14"/>
                        </svg>
                        Download
                    </button>
                </div>
                
            </div>

            <div class="main-panel">
                <div class="beat-workspace">
                    <div class="piano-panel">
                        <div class="panel-header">
                            <h2>PIANO</h2>
                        </div>

                        <div class="grid-wrapper">
                            <div class="piano-grid" id="pianoGrid">
                                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                            </div>
                        </div>
                    </div>

                    <div class="drum-panel">
                        <div class="panel-header">
                            <h2>DRUMS</h2>
                        </div>

                        <div class="grid-wrapper">
                            <div class="drum-grid" id="drumGrid">
                                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../dist/index.js"></script>
</body>
</html>
